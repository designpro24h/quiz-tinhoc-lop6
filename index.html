<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ Thống Thi Trắc Nghiệm Tin Học 6</title>
    <style>
        :root { --primary: #2563eb; --bg: #f1f5f9; --text: #1e293b; --success: #22c55e; --error: #ef4444; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        
        /* Form Đăng Nhập */
        #login-screen { text-align: center; padding: 40px 20px; }
        .input-group { margin-bottom: 15px; text-align: left; max-width: 300px; margin-left: auto; margin-right: auto; }
        .input-group label { display: block; margin-bottom: 5px; font-weight: bold; }
        input[type="text"], input[type="password"] { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        
        /* Giao diện bài thi */
        #quiz-content { display: none; }
        .user-info-bar { background: #e0f2fe; padding: 10px 20px; border-radius: 8px; margin-bottom: 20px; font-weight: bold; display: flex; justify-content: space-between; }
        
        .question-box { margin-bottom: 25px; padding: 20px; border: 1px solid #e2e8f0; border-radius: 10px; }
        .question-text { font-weight: 700; margin-bottom: 15px; display: block; color: #334155; }
        .options { list-style: none; padding: 0; }
        .options li { margin: 10px 0; padding: 12px; border-radius: 8px; border: 1px solid #f1f5f9; display: flex; align-items: center; cursor: pointer; transition: 0.2s; }
        .options li:hover { background: #f8fafc; }
        input[type="radio"] { margin-right: 12px; transform: scale(1.2); }

        /* Màu sắc kết quả */
        .correct-ans { background: #dcfce7 !important; border-color: var(--success) !important; font-weight: bold; }
        .wrong-ans { background: #fee2e2 !important; border-color: var(--error) !important; }

        .btn { width: 100%; padding: 15px; border: none; border-radius: 8px; font-size: 18px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn-blue { background: var(--primary); color: white; }
        .btn-blue:hover { background: #1d4ed8; }
        #result-area { margin-top: 25px; padding: 20px; border-radius: 10px; text-align: center; display: none; font-size: 22px; background: #eff6ff; border: 1px solid #bfdbfe; }
    </style>
</head>
<body>

<div class="container">
    <div id="login-screen">
        <h2>HỆ THỐNG THI TRỰC TUYẾN</h2>
        <p style="color: #64748b;">Vui lòng nhập thông tin để bắt đầu bài thi</p>
        <div class="input-group">
            <label>Họ và Tên:</label>
            <input type="text" id="student-name" placeholder="Nhập tên của em...">
        </div>
        <div class="input-group">
            <label>Mật khẩu:</label>
            <input type="password" id="password" placeholder="Mật khẩu mặc định...">
        </div>
        <button class="btn btn-blue" onclick="checkLogin()">VÀO THI</button>
        <p id="login-error" style="color: red; margin-top: 10px; display: none;">❌ Sai mật khẩu hoặc chưa nhập tên!</p>
    </div>

    <div id="quiz-content">
        <div id="result-area"></div>
        <button class="btn" id="reload-btn" style="display:none; margin-top:10px; background:#64748b; color:white;" onclick="location.reload()">LÀM LẠI BÀI MỚI</button>
        <div class="user-info-bar">
            <span>Học sinh: <span id="display-name" style="color: var(--primary);"></span></span>
            <span id="timer">Đang làm bài...</span>
        </div>
        <div id="quiz-wrapper"></div>
        <button class="btn btn-blue" id="submit-btn" onclick="calculateScore()">NỘP BÀI & XEM ĐÁP ÁN</button>
        
    </div>
</div>

                    `).join('')}
                </ul>
            </div>
        `).join('');
    }

function calculateScore() {
        // 1. Kiểm tra tất cả các câu hỏi
        for (let i = 0; i < currentQuestions.length; i++) {
            const selected = document.querySelector(`input[name="q${i}"]:checked`);
            if (!selected) {
                // Nếu phát hiện câu chưa làm
                alert(`Em chưa hoàn thành bài thi! Hãy trả lời câu số ${i + 1}.`);
                
                // Cuộn đến câu đó và làm nổi bật
                const questionBoxes = document.querySelectorAll('.question-box');
                questionBoxes[i].scrollIntoView({ behavior: 'smooth', block: 'center' });
                
                // Hiệu ứng nhấp nháy đỏ để học sinh chú ý
                questionBoxes[i].style.border = "2px solid #ef4444";
                questionBoxes[i].style.backgroundColor = "#fff5f5";
                
                return; // Ngừng nộp bài
            }
        }

        // 2. Nếu đã làm đủ 56 câu -> Tính điểm
        let score = 0;
        currentQuestions.forEach((data, index) => {
            const selected = document.querySelector(`input[name="q${index}"]:checked`);
            const correctIdx = data.a;
            const userAns = parseInt(selected.value);
            const questionBoxes = document.querySelectorAll('.question-box');
            
            // Reset lại màu nền/viền về mặc định trước khi hiện kết quả
            questionBoxes[index].style.border = "1px solid #e2e8f0";
            questionBoxes[index].style.backgroundColor = "white";

            // Hiện đáp án đúng màu xanh
            document.getElementById(`li-${index}-${correctIdx}`).classList.add('correct-ans');

            if (userAns === correctIdx) {
                score++;
            } else {
                // Hiện câu sai màu đỏ
                document.getElementById(`li-${index}-${userAns}`).classList.add('wrong-ans');
            }
            
            // Khóa bài sau khi nộp
            document.querySelectorAll(`input[name="q${index}"]`).forEach(r => r.disabled = true);
        });

        // 3. Hiển thị bảng điểm
        const res = document.getElementById('result-area');
        res.style.display = 'block';
        res.innerHTML = `🏁 Hoàn thành: <strong>${score}/${currentQuestions.length}</strong> câu đúng.<br>
                        Điểm số: <strong>${(score/currentQuestions.length*10).toFixed(1)}</strong> / 10`;
        
        document.getElementById('submit-btn').style.display = 'none';
        document.getElementById('reload-btn').style.display = 'block';
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }
